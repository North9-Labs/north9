name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit tests — Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Tests
        run: |
          python -m pytest tests/ \
            --ignore=tests/test_integration.py \
            --ignore=tests/test_security.py \
            -v --tb=short

      - name: Lint
        run: ruff check src/ tests/

      - name: Type check
        run: mypy src/north9/ --ignore-missing-imports

  integration:
    name: Integration tests — Docker
    runs-on: ubuntu-latest
    needs: unit
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Pull base image
        run: docker pull python:3.12-slim

      - name: Integration + security tests
        run: python -m pytest tests/test_integration.py tests/test_security.py -v -m integration --tb=short
        timeout-minutes: 10

  docker-image:
    name: Build runtime Docker image
    runs-on: ubuntu-latest
    needs: unit
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Build north9-runtime image
        run: docker build -t north9/runtime:latest .
        timeout-minutes: 10
