name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: pip install -e ".[dev]"

      - name: Unit tests (no Docker required)
        run: python -m pytest tests/test_memory.py tests/test_sandbox.py -v

      - name: Lint
        run: ruff check src/ tests/

      - name: Type check
        run: mypy src/north9/ --ignore-missing-imports

  integration:
    name: Integration tests (Docker)
    runs-on: ubuntu-latest
    needs: unit
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: pip install -e ".[dev]"

      - name: Pull test image
        run: docker pull python:3.12-slim

      - name: Integration + security tests
        run: python -m pytest tests/test_integration.py tests/test_security.py -v -m integration
        timeout-minutes: 10
